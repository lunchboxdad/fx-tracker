<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>도시락통FX</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; color: #1c1c1e; max-width: 480px; margin: 0 auto; display:flex; flex-direction:column; overflow:hidden; }

.header { background: #fff; padding: 52px 16px 0; border-bottom: 0.5px solid #c6c6c8; flex:none; }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.header h1 { font-size: 24px; font-weight: 700; }
.header-btns { display: flex; gap: 8px; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 20px; padding: 4px; color: #3a3a3c; }

.tabs { display: flex; }
.tab { flex: 1; padding: 10px 4px; font-size: 13px; font-weight: 400; color: #8e8e93; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
.tab.active { color: #1c1c1e; font-weight: 600; border-bottom: 2px solid #e0412b; }

/* Fixed rate bar — visible on all tabs */
.rate-bar { flex:none; background:#fff; border-bottom:0.5px solid #c6c6c8; padding:8px 16px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; font-size:12px; }
.rate-bar .refresh { margin-left:auto; background:none; border:none; color:#185fa5; font-size:12px; cursor:pointer; padding:2px 0; }

/* Tab pages — fixed top + scrollable list */
.tab-page { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; width:100%; }
.top-fixed { flex:none; padding: 12px 16px 4px; }
.scroll-list { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding: 0 16px 24px; }

.card { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
.card-label { font-size: 12px; color: #8e8e93; margin-bottom: 8px; font-weight: 500; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
.field-label { font-size: 11px; color: #8e8e93; margin-bottom: 2px; }
.field-val { font-size: 13px; }

.pnl-pos { color: #0f6e56; background: #e1f5ee; font-size: 12px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
.pnl-neg { color: #993c1d; background: #faece7; font-size: 12px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
.ccy-usd { background: #e1f5ee; color: #0f6e56; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.ccy-jpy { background: #e6f1fb; color: #185fa5; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.ccy-eur { background: #faeeda; color: #854f0b; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }

.btn-sell { flex: 1; padding: 8px; background: #e0412b; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
.btn-ghost { padding: 8px 12px; background: none; border: 0.5px solid #c6c6c8; border-radius: 8px; font-size: 13px; cursor: pointer; color: #8e8e93; }
.btn-primary { flex: 1; padding: 13px; background: #e0412b; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-cancel { flex: 1; padding: 13px; background: none; border: 0.5px solid #c6c6c8; border-radius: 10px; font-size: 15px; cursor: pointer; color: #3a3a3c; }
.btn-add-inline { padding: 0 14px; background: #e0412b; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; display: flex; align-items: flex-end; }
.modal { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 40px; width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { font-size: 22px; color: #8e8e93; background: none; border: none; cursor: pointer; line-height: 1; }

.form-row { margin-bottom: 16px; }
.form-label { font-size: 13px; color: #8e8e93; margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 11px 12px; border: 0.5px solid #c6c6c8; border-radius: 10px; font-size: 15px; background: #f2f2f7; outline: none; -webkit-appearance: none; }
.form-input:focus { border-color: #e0412b; background: #fff; }
select.form-input { appearance: none; -webkit-appearance: none; }
.btn-row { display: flex; gap: 8px; margin-top: 20px; }

.big-num { font-size: 22px; font-weight: 600; }
.sub-num { font-size: 13px; color: #8e8e93; margin-top: 2px; }

.divider { border: none; border-top: 0.5px solid #e5e5ea; margin: 10px 0; }
.empty { text-align: center; color: #8e8e93; font-size: 14px; margin-top: 60px; line-height: 1.8; }
.error-msg { font-size: 13px; color: #993c1d; margin-bottom: 12px; }

/* Segment controls */
.seg { display: flex; background: #e5e5ea; border-radius: 8px; padding: 2px; gap: 2px; margin-bottom:10px; }
.seg-btn { flex: 1; padding: 5px 2px; font-size: 12px; border: none; border-radius: 6px; background: none; color: #8e8e93; cursor: pointer; font-weight: 400; }
.seg-btn.active { background: #fff; color: #1c1c1e; font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.12); }

/* Chart currency toggle buttons */
.ccy-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
.ccy-toggle-btn { flex: 1; padding: 6px 2px; font-size: 12px; font-weight: 600; border: 1px solid #e5e5ea; border-radius: 6px; background: #fff; color: #c6c6c8; cursor: pointer; transition: all 0.12s ease; }
.ccy-toggle-btn.active { color: #fff; border-color: transparent; }

/* Sort row */
.sort-row { display:flex; gap:8px; margin-bottom:10px; align-items:center; }
.sort-select { flex:1; padding:9px 10px; font-size:13px; }

/* Chart area */
.chart-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.chart-inner { min-width: 320px; }
svg text { font-family: -apple-system, sans-serif; }

/* Rate popup */
.rate-popup { position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 60; display: flex; align-items: flex-start; justify-content: flex-end; padding: 110px 16px 0; background: rgba(0,0,0,0.4); opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.18s ease; }
.rate-popup.open { opacity: 1; visibility: visible; pointer-events: all; }
.rate-box { background: #fff; border-radius: 14px; padding: 16px; width: 240px; max-width: calc(100vw - 32px); box-shadow: 0 8px 32px rgba(0,0,0,0.18); transform: translateY(-10px) scale(0.95); opacity: 0; transition: all 0.18s ease; }
.rate-popup.open .rate-box { transform: translateY(0) scale(1); opacity: 1; }
.rate-row-item { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.rate-ccy-lbl { font-size: 13px; color: #8e8e93; min-width: 44px; font-weight: 500; }
.rate-input { flex: 1; padding: 8px 10px; border: 0.5px solid #c6c6c8; border-radius: 8px; font-size: 14px; background: #f2f2f7; outline: none; }
.rate-input:focus { border-color: #e0412b; background: #fff; }
.rate-auto { font-size: 11px; color: #8e8e93; }
.rate-auto.loading { color: #185fa5; }
.rate-refresh { background: none; border: none; font-size: 13px; color: #185fa5; cursor: pointer; padding: 4px 0; }

/* Edit menu dropdown */
.menu-wrap { position: relative; display:flex; align-items:center; gap:6px; }
.menu-dropdown { position: absolute; top: 34px; right: 28px; background: #fff; border: 0.5px solid #c6c6c8; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 100; min-width: 100px; overflow:hidden; }
.menu-item { display:block; width:100%; padding: 10px 14px; background: none; border: none; text-align:left; font-size: 13px; color: #e0412b; cursor:pointer; }

/* Checkbox rows */
.checkbox-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:14px; }
.checkbox-row input { width:18px; height:18px; }

/* Export preview table */
.export-table-wrap { overflow-x:auto; margin-bottom:14px; max-height: 40vh; }
.export-table { width:100%; font-size:11px; border-collapse:collapse; white-space:nowrap; }
.export-table th { text-align:left; padding:5px 6px; border-bottom:1px solid #e5e5ea; color:#8e8e93; position:sticky; top:0; background:#fff; }
.export-table td { padding:5px 6px; border-bottom:1px solid #f2f2f7; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <h1>도시락통FX</h1>
    <div class="header-btns">
      <button class="icon-btn" onclick="toggleRatePopup()" title="환율 설정">💱</button>
      <button class="icon-btn" onclick="openExportModal()" title="내보내기">📤</button>
      <button class="icon-btn" onclick="openSettingsModal()" title="백업 설정">⚙️</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">투자현황</button>
    <button class="tab" onclick="switchTab('open')">투자진행중</button>
    <button class="tab" onclick="switchTab('closed')">투자완료</button>
  </div>
</div>

<!-- Fixed rate bar -->
<div class="rate-bar" id="rate-bar"></div>

<!-- Rate Popup -->
<div class="rate-popup" id="rate-popup" onclick="closeRatePopupIfBg(event)">
  <div class="rate-box">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      환율 설정
      <button class="rate-refresh" onclick="fetchRates()">↻ 자동조회</button>
    </div>
    <div id="rate-status" class="rate-auto" style="margin-bottom:10px"></div>
    <div id="rate-inputs"></div>
    <p style="font-size:11px;color:#8e8e93;margin-top:8px">직접 입력 시 자동조회값보다 우선 적용됩니다.<br>JPY는 100엔 기준 단위입니다 (예: 952.30).</p>
  </div>
</div>

<!-- Tab pages -->
<div id="tab-overview" class="tab-page">
  <div class="top-fixed" id="overview-top"></div>
  <div class="scroll-list" id="overview-list"></div>
</div>
<div id="tab-open" class="tab-page" style="display:none">
  <div class="top-fixed" id="open-top"></div>
  <div class="scroll-list" id="open-list"></div>
</div>
<div id="tab-closed" class="tab-page" style="display:none">
  <div class="top-fixed" id="closed-top"></div>
  <div class="scroll-list" id="closed-list"></div>
</div>

<!-- Add Modal -->
<div class="overlay" id="add-modal" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="modal-title">
      <span>매수 추가</span>
      <button class="modal-close" onclick="closeAddModal()">×</button>
    </div>
    <div id="add-error" class="error-msg" style="display:none"></div>
    <div class="form-row"><label class="form-label">매수일</label><input type="date" id="f-date" class="form-input"></div>
    <div class="form-row"><label class="form-label">통화</label>
      <select id="f-ccy" class="form-input" onchange="updateAddRateDefault()"><option value="USD">USD (달러)</option><option value="JPY">JPY (엔화)</option><option value="EUR">EUR (유로)</option></select>
    </div>
    <div class="form-row"><label class="form-label">기준환율 <span style="color:#8e8e93;font-size:11px">JPY는 100엔당 (예: 952.30)</span></label><input type="number" id="f-rate" class="form-input" placeholder="예) 1520.02" inputmode="decimal"></div>
    <div class="form-row"><label class="form-label">매수금액 (외화)</label><input type="number" id="f-fx" class="form-input" placeholder="예) 131577.21" inputmode="decimal"></div>
    <div class="form-row"><label class="form-label">매수금액 KRW <span style="color:#8e8e93;font-size:11px">비우면 자동계산</span></label><input type="number" id="f-krw" class="form-input" placeholder="예) 199999990" inputmode="numeric"></div>
    <div class="form-row"><label class="form-label">메모 (선택)</label><input type="text" id="f-note" class="form-input"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveTrade()">저장</button>
      <button class="btn-cancel" onclick="closeAddModal()">취소</button>
    </div>
  </div>
</div>

<!-- Sell Modal -->
<div class="overlay" id="sell-modal" style="display:none" onclick="if(event.target===this)closeSellModal()">
  <div class="modal">
    <div class="modal-title">
      <span id="sell-title">매도</span>
      <button class="modal-close" onclick="closeSellModal()">×</button>
    </div>
    <div id="sell-error" class="error-msg" style="display:none"></div>
    <div class="form-row"><label class="form-label">매도일</label><input type="date" id="s-date" class="form-input"></div>
    <div class="form-row"><label class="form-label">매도 기준환율 <span style="color:#8e8e93;font-size:11px">JPY는 100엔당</span></label><input type="number" id="s-rate" class="form-input" placeholder="예) 1526.76" inputmode="decimal" oninput="updateSellPreview()"></div>
    <div id="sell-preview" style="margin-bottom:12px;font-size:13px;color:#8e8e93;display:none"></div>
    <div class="btn-row">
      <button class="btn-primary" onclick="confirmSell()">확인</button>
      <button class="btn-cancel" onclick="closeSellModal()">취소</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="overlay" id="edit-modal" style="display:none" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">
    <div class="modal-title">
      <span id="edit-title">매수 수정</span>
      <div class="menu-wrap">
        <button class="icon-btn" onclick="toggleEditMenu()" title="더보기">⋯</button>
        <div id="edit-menu" class="menu-dropdown" style="display:none">
          <button class="menu-item" id="edit-menu-action" onclick="editMenuAction()">삭제</button>
        </div>
        <button class="modal-close" onclick="closeEditModal()">×</button>
      </div>
    </div>
    <div id="edit-error" class="error-msg" style="display:none"></div>
    <div class="form-row"><label class="form-label">매수일</label><input type="date" id="e-date" class="form-input"></div>
    <div class="form-row"><label class="form-label">통화</label>
      <select id="e-ccy" class="form-input"><option value="USD">USD (달러)</option><option value="JPY">JPY (엔화)</option><option value="EUR">EUR (유로)</option></select>
    </div>
    <div class="form-row"><label class="form-label">매수 기준환율 <span style="color:#8e8e93;font-size:11px">JPY는 100엔당</span></label><input type="number" id="e-rate" class="form-input" inputmode="decimal"></div>
    <div class="form-row"><label class="form-label">매수금액 (외화)</label><input type="number" id="e-fx" class="form-input" inputmode="decimal"></div>
    <div class="form-row"><label class="form-label">매수금액 KRW</label><input type="number" id="e-krw" class="form-input" inputmode="numeric"></div>
    <div class="form-row"><label class="form-label">메모 (선택)</label><input type="text" id="e-note" class="form-input"></div>
    <div id="edit-sell-fields" style="display:none">
      <hr class="divider">
      <div class="form-row"><label class="form-label">매도일</label><input type="date" id="e-sdate" class="form-input"></div>
      <div class="form-row"><label class="form-label">매도 기준환율 <span style="color:#8e8e93;font-size:11px">JPY는 100엔당</span></label><input type="number" id="e-srate" class="form-input" inputmode="decimal"></div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveEditTrade()">저장</button>
      <button class="btn-cancel" onclick="closeEditModal()">취소</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="overlay" id="export-modal" style="display:none" onclick="if(event.target===this)closeExportModal()">
  <div class="modal">
    <div class="modal-title">
      <span id="export-title">내보내기</span>
      <button class="modal-close" onclick="closeExportModal()">×</button>
    </div>
    <div id="export-body"></div>
  </div>
</div>

<!-- Settings / Backup Modal -->
<div class="overlay" id="settings-modal" style="display:none" onclick="if(event.target===this)closeSettingsModal()">
  <div class="modal">
    <div class="modal-title">
      <span>GitHub 자동 백업 설정</span>
      <button class="modal-close" onclick="closeSettingsModal()">×</button>
    </div>
    <div id="settings-error" class="error-msg" style="display:none"></div>
    <div id="settings-info" style="font-size:13px;color:#8e8e93;display:none;margin-bottom:12px"></div>
    <div class="form-row"><label class="form-label">Personal Access Token <span style="color:#8e8e93;font-size:11px">(repo 쓰기 권한)</span></label><input type="password" id="gh-token" class="form-input" placeholder="ghp_..."></div>
    <div class="form-row"><label class="form-label">Repo Owner</label><input type="text" id="gh-owner" class="form-input" placeholder="예) lunchboxdad"></div>
    <div class="form-row"><label class="form-label">Repo 이름</label><input type="text" id="gh-repo" class="form-input" placeholder="예) fx-backup"></div>
    <div class="form-row"><label class="form-label">백업 파일 경로</label><input type="text" id="gh-path" class="form-input" placeholder="예) fx_trades_backup.json"></div>
    <p id="gh-last" style="font-size:12px;color:#8e8e93;margin-bottom:4px"></p>
    <p style="font-size:11px;color:#8e8e93;margin-bottom:12px">앱을 열 때마다 마지막 백업 후 24시간이 지났는지 확인하여 자동으로 백업합니다. 토큰은 이 브라우저에만 저장됩니다.</p>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveAndBackup()">저장 및 즉시 백업</button>
      <button class="btn-cancel" onclick="closeSettingsModal()">닫기</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'fx_trades_v3';
const RATES_KEY = 'fx_rates_v1';
const SETTINGS_KEY = 'fx_settings_v1';
const LAST_BACKUP_KEY = 'fx_last_backup';

let trades = [];
let autoRates = { USD: 0, JPY: 0, EUR: 0 };
let manualRates = { USD: '', JPY: '', EUR: '' };
let currentTab = 'overview';
let sellTargetId = null;
let editTargetId = null;
let ratePopupOpen = false;

let periodMode = 'month'; // day | week | month | year
let sortOpen = 'date_desc';
let sortClosed = 'date_desc';
let closedRange = { start: '', end: '' };

let exportFilters = { start:'', end:'', buy:true, sell:true, USD:true, JPY:true, EUR:true };
let exportStage = 'select';

let ghSettings = { token:'', owner:'', repo:'', path:'fx_trades_backup.json' };

// ── Storage ──────────────────────────────────────────────────────────────────
function load() {
  try { trades = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { trades = []; }
  try {
    const saved = JSON.parse(localStorage.getItem(RATES_KEY) || '{}');
    if (saved.manual) manualRates = saved.manual;
    if (saved.auto) autoRates = saved.auto;
  } catch {}
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    ghSettings = { ...ghSettings, ...s };
  } catch {}
  migrateJPY();
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(trades)); }
function saveRates() { localStorage.setItem(RATES_KEY, JSON.stringify({ manual: manualRates, auto: autoRates })); }
function saveSettings() {
  ghSettings = {
    token: document.getElementById('gh-token').value.trim(),
    owner: document.getElementById('gh-owner').value.trim(),
    repo: document.getElementById('gh-repo').value.trim(),
    path: document.getElementById('gh-path').value.trim() || 'fx_trades_backup.json'
  };
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(ghSettings));
}

// One-time migration: old data stored JPY rates as "per 1 JPY" (~6~12).
// New convention stores JPY rates as "per 100 JPY" (Korean bank convention, ~800~1100).
function migrateJPY() {
  let changed = false;
  trades.forEach(t => {
    if (t.ccy === 'JPY') {
      if (t.buyRate && t.buyRate < 100) { t.buyRate = Math.round(t.buyRate * 10000) / 100; changed = true; }
      if (t.sellRate && t.sellRate < 100) { t.sellRate = Math.round(t.sellRate * 10000) / 100; changed = true; }
    }
  });
  if (autoRates.JPY && autoRates.JPY < 100) { autoRates.JPY = Math.round(autoRates.JPY * 10000) / 100; changed = true; saveRates(); }
  if (manualRates.JPY && parseFloat(manualRates.JPY) > 0 && parseFloat(manualRates.JPY) < 100) {
    manualRates.JPY = String(Math.round(parseFloat(manualRates.JPY) * 10000) / 100); changed = true; saveRates();
  }
  if (changed) save();
}

// Convert a stored rate (per-1 unit for USD/EUR, per-100 unit for JPY) to KRW-per-1-foreign-unit
function krwRate(ccy, rate) { return ccy === 'JPY' ? rate / 100 : rate; }

function effectiveRate(ccy) {
  const m = parseFloat(manualRates[ccy]);
  return (m && m > 0) ? m : (autoRates[ccy] || 0);
}

// ── Fetch rates ───────────────────────────────────────────────────────────────
async function fetchRates() {
  const statusEl = document.getElementById('rate-status');
  if (statusEl) { statusEl.textContent = '조회중...'; statusEl.className = 'rate-auto loading'; }
  try {
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/KRW');
    const data = await res.json();
    // data.rates[X] = X per 1 KRW → KRW per 1 X = 1 / data.rates[X]
    autoRates.USD = data.rates['USD'] ? Math.round((1 / data.rates['USD']) * 100) / 100 : 0;
    autoRates.EUR = data.rates['EUR'] ? Math.round((1 / data.rates['EUR']) * 100) / 100 : 0;
    // JPY stored per 100 JPY (Korean bank convention)
    autoRates.JPY = data.rates['JPY'] ? Math.round((100 / data.rates['JPY']) * 100) / 100 : 0;
    saveRates();
    if (statusEl) { statusEl.textContent = `자동조회 완료 (${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})})`; statusEl.className = 'rate-auto'; }
    renderRateInputs();
    render();
  } catch(e) {
    if (statusEl) { statusEl.textContent = '자동조회 실패 (네트워크 확인)'; statusEl.className = 'rate-auto'; }
  }
}

// ── Utils ────────────────────────────────────────────────────────────────────
function fmt(n, d=0) {
  if (n == null || isNaN(n)) return '-';
  return Number(n).toLocaleString('ko-KR', {minimumFractionDigits:d, maximumFractionDigits:d});
}
function fmtFx(n, ccy) { return fmt(n, ccy==='JPY'?0:2)+' '+ccy; }
function today() { return new Date().toISOString().slice(0,10); }
function pnlBadge(val, pct) {
  const pos = val >= 0; const cls = pos?'pnl-pos':'pnl-neg'; const s = pos?'+':'';
  return `<span class="${cls}">${s}${fmt(val)}원 (${s}${Number(pct).toFixed(2)}%)</span>`;
}
function ccyTag(ccy) { return `<span class="ccy-${ccy.toLowerCase()}">${ccy}</span>`; }

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  currentTab = name;
  ['overview','open','closed'].forEach(t => document.getElementById('tab-'+t).style.display = t===name?'flex':'none');
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['overview','open','closed'][i]===name));

// ── Sorting ──────────────────────────────────────────────────────────────────
function sortOptions(current) {
  const opts = { date_desc:'최신날짜순', date_asc:'이전날짜순', price_desc:'가격높은순', price_asc:'가격낮은순' };
  return Object.entries(opts).map(([k,v]) => `<option value="${k}" ${current===k?'selected':''}>${v}</option>`).join('');
}
function sortTrades(list, mode, dateField) {
  const arr = [...list];
  if (mode==='date_desc') arr.sort((a,b)=>b[dateField].localeCompare(a[dateField]));
  else if (mode==='date_asc') arr.sort((a,b)=>a[dateField].localeCompare(b[dateField]));
  else if (mode==='price_desc') arr.sort((a,b)=>b.buyKrw-a.buyKrw);
  else if (mode==='price_asc') arr.sort((a,b)=>a.buyKrw-b.buyKrw);
  return arr;
}

// ── Chart helpers ─────────────────────────────────────────────────────────────
function periodLabel(dateStr, mode) {
  const d = new Date(dateStr);
  if (mode==='day') return dateStr.slice(5); // MM-DD
  if (mode==='week') {
    const start = new Date(d); start.setDate(d.getDate()-d.getDay());
    return start.toISOString().slice(5,10);
  }
  if (mode==='month') return dateStr.slice(0,7);
  if (mode==='year') return dateStr.slice(0,4);
  return dateStr;
}

function buildChartData(tradeList, mode) {
  const buckets = {};
  for (const t of tradeList) {
    const dateKey = t.sellDate || t.buyDate;
    const label = periodLabel(dateKey, mode);
    if (!buckets[label]) buckets[label] = { pnl: 0, count: 0 };
    const rate = effectiveRate(t.ccy);
    let pnl;
    if (t.sellRate) {
      pnl = t.buyFx * krwRate(t.ccy, t.sellRate) - t.buyKrw;
    } else {
      pnl = t.buyFx * krwRate(t.ccy, (rate || t.buyRate)) - t.buyKrw;
    }
    buckets[label].pnl += pnl;
    buckets[label].count++;
  }
  const labels = Object.keys(buckets).sort();
  let cum = 0;
  const values = labels.map(l => { cum += buckets[l].pnl; return Math.round(cum); });
  return { labels, values };
}

function renderChart(containerId, data) {
  const { labels, values } = data;
  const target = document.getElementById(containerId);
  if (!target) return;
  if (labels.length === 0) {
    target.innerHTML = '<p style="text-align:center;color:#8e8e93;font-size:13px;padding:16px 0">데이터 없음</p>';
    return;
  }
  const W = Math.max(280, labels.length * 44);
  const H = 120;
  const padL = 56, padR = 10, padT = 14, padB = 24;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const minV = Math.min(0, ...values);
  const maxV = Math.max(0, ...values);
  const range = maxV - minV || 1;

  function xPos(i) { return padL + (i / Math.max(labels.length-1,1)) * chartW; }
  function yPos(v) { return padT + (1 - (v - minV) / range) * chartH; }

  const ticks = 4;
  let gridHtml = '';
  for (let i = 0; i <= ticks; i++) {
    const v = minV + (range / ticks) * i;
    const y = yPos(v);
    const lbl = Math.abs(v) >= 1000000 ? (v/1000000).toFixed(1)+'M' : Math.abs(v) >= 1000 ? (v/1000).toFixed(0)+'K' : fmt(v);
    gridHtml += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#e5e5ea" stroke-width="0.5"/>`;
    gridHtml += `<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#8e8e93">${lbl}</text>`;
  }

  const zeroY = yPos(0);
  gridHtml += `<line x1="${padL}" y1="${zeroY}" x2="${W-padR}" y2="${zeroY}" stroke="#c6c6c8" stroke-width="1"/>`;

  let path = `M ${xPos(0)} ${zeroY}`;
  for (let i = 0; i < values.length; i++) path += ` L ${xPos(i)} ${yPos(values[i])}`;
  path += ` L ${xPos(values.length-1)} ${zeroY} Z`;

  let linePath = values.map((v,i) => `${i===0?'M':'L'} ${xPos(i)} ${yPos(v)}`).join(' ');

  let xLabels = '';
  const step = Math.ceil(labels.length / 6);
  labels.forEach((l, i) => {
    if (i % step === 0 || i === labels.length-1) {
      xLabels += `<text x="${xPos(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#8e8e93">${l}</text>`;
    }
  });

  const lastX = xPos(values.length-1), lastY = yPos(values[values.length-1]);
  const lastV = values[values.length-1];
  const dotColor = lastV >= 0 ? '#0f6e56' : '#e0412b';
  const lastLbl = Math.abs(lastV) >= 1000000 ? (lastV/1000000).toFixed(2)+'M' : fmt(lastV);

  const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${gridHtml}
    <path d="${path}" fill="${lastV>=0?'rgba(15,110,86,0.08)':'rgba(224,65,43,0.08)'}" />
    <path d="${linePath}" fill="none" stroke="${dotColor}" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="${lastX}" cy="${lastY}" r="3.5" fill="${dotColor}"/>
    <text x="${lastX}" y="${lastY-7}" text-anchor="middle" font-size="9" fill="${dotColor}" font-weight="600">${lastLbl}</text>
    ${xLabels}
  </svg>`;

  target.innerHTML = `<div class="chart-wrap"><div class="chart-inner">${svg}</div></div>`;
}

const CHART_COLORS = { ALL:'#1c1c1e', USD:'#0f6e56', JPY:'#185fa5', EUR:'#854f0b' };

// Renders one chart overlaying multiple series (ALL/USD/JPY/EUR), based on chartToggle state
function renderMultiChart(containerId, tradeList, mode, toggles) {
  const target = document.getElementById(containerId);
  if (!target) return;
  const ccys = ['ALL','USD','JPY','EUR'];
  const active = ccys.filter(c => toggles[c]);

  if (active.length === 0) {
    target.innerHTML = '<p style="text-align:center;color:#8e8e93;font-size:13px;padding:16px 0">표시할 통화를 선택하세요</p>';
    return;
  }

  // Build per-series data first
  const seriesData = {};
  const labelSet = new Set();
  for (const c of active) {
    const list = c==='ALL' ? tradeList : tradeList.filter(t=>t.ccy===c);
    const d = buildChartData(list, mode);
    seriesData[c] = d;
    d.labels.forEach(l=>labelSet.add(l));
  }
  const labels = [...labelSet].sort();

  if (labels.length === 0) {
    target.innerHTML = '<p style="text-align:center;color:#8e8e93;font-size:13px;padding:16px 0">데이터 없음</p>';
    return;
  }

  // Align each series onto the unified label set, carrying forward last cumulative value
  for (const c of active) {
    const d = seriesData[c];
    const map = {};
    d.labels.forEach((l,i)=>{ map[l]=d.values[i]; });
    let last = 0;
    seriesData[c].aligned = labels.map(l => { if (l in map) last = map[l]; return last; });
  }

  const W = Math.max(280, labels.length * 44);
  const H = 120;
  const padL = 56, padR = 10, padT = 14, padB = 24;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  let allVals = [];
  active.forEach(c => allVals.push(...seriesData[c].aligned));
  const minV = Math.min(0, ...allVals);
  const maxV = Math.max(0, ...allVals);
  const range = maxV - minV || 1;

  function xPos(i) { return padL + (i / Math.max(labels.length-1,1)) * chartW; }
  function yPos(v) { return padT + (1 - (v - minV) / range) * chartH; }

  const ticks = 4;
  let gridHtml = '';
  for (let i = 0; i <= ticks; i++) {
    const v = minV + (range / ticks) * i;
    const y = yPos(v);
    const lbl = Math.abs(v) >= 1000000 ? (v/1000000).toFixed(1)+'M' : Math.abs(v) >= 1000 ? (v/1000).toFixed(0)+'K' : fmt(v);
    gridHtml += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#e5e5ea" stroke-width="0.5"/>`;
    gridHtml += `<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#8e8e93">${lbl}</text>`;
  }
  const zeroY = yPos(0);
  gridHtml += `<line x1="${padL}" y1="${zeroY}" x2="${W-padR}" y2="${zeroY}" stroke="#c6c6c8" stroke-width="1"/>`;

  let xLabels = '';
  const step = Math.ceil(labels.length / 6);
  labels.forEach((l, i) => {
    if (i % step === 0 || i === labels.length-1) {
      xLabels += `<text x="${xPos(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#8e8e93">${l}</text>`;
    }
  });

  let seriesSvg = '';
  for (const c of active) {
    const values = seriesData[c].aligned;
    const color = CHART_COLORS[c];
    const linePath = values.map((v,i) => `${i===0?'M':'L'} ${xPos(i)} ${yPos(v)}`).join(' ');
    const lastX = xPos(values.length-1), lastY = yPos(values[values.length-1]);
    const lastV = values[values.length-1];
    const lastLbl = (active.length===1 ? (c+': ') : (c+' ')) + (Math.abs(lastV) >= 1000000 ? (lastV/1000000).toFixed(2)+'M' : fmt(lastV));
    seriesSvg += `<path d="${linePath}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>`;
    seriesSvg += `<circle cx="${lastX}" cy="${lastY}" r="3" fill="${color}"/>`;
    seriesSvg += `<text x="${lastX}" y="${lastY-7}" text-anchor="middle" font-size="9" fill="${color}" font-weight="600">${lastLbl}</text>`;
  }

  const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${gridHtml}
    ${seriesSvg}
    ${xLabels}
  </svg>`;

  target.innerHTML = `<div class="chart-wrap"><div class="chart-inner">${svg}</div></div>`;
}

let chartToggle = { ALL: true, USD: false, JPY: false, EUR: false };

function setPeriod(p) { periodMode = p; render(); }

// ── Render Overview ───────────────────────────────────────────────────────────
function renderOverview() {
  document.getElementById('overview-top').innerHTML = '';
  const list = document.getElementById('overview-list');
  const open = trades.filter(t => !t.sellRate);
  const closed = trades.filter(t => t.sellRate);
  const byCcy = {};
  for (const t of open) {
    if (!byCcy[t.ccy]) byCcy[t.ccy] = {buyKrw:0, buyFx:0};
    byCcy[t.ccy].buyKrw += t.buyKrw;
    byCcy[t.ccy].buyFx += t.buyFx;
  }
  let openRows = ''; let totalBuy=0, totalCur=0;
  for (const [ccy, s] of Object.entries(byCcy)) {
    const avgKrwPerUnit = s.buyFx>0 ? s.buyKrw/s.buyFx : 0;
    const avgDisplay = ccy==='JPY' ? avgKrwPerUnit*100 : avgKrwPerUnit;
    const rate = effectiveRate(ccy) || avgDisplay;
    const cur = s.buyFx * krwRate(ccy, rate);
    const pnl = cur - s.buyKrw; const pct = s.buyKrw>0?(pnl/s.buyKrw)*100:0;
    totalBuy += s.buyKrw; totalCur += cur;
    openRows += `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">${ccyTag(ccy)}${pnlBadge(pnl,pct)}</div>
      <div class="grid2">
        <div><div class="field-label">매수금액</div><div class="field-val">${fmt(s.buyKrw)}원</div></div>
        <div><div class="field-label">보유 ${ccy}</div><div class="field-val">${fmtFx(s.buyFx,ccy)}</div></div>
        <div><div class="field-label">평균환율</div><div class="field-val">${fmt(avgDisplay,2)}</div></div>
        <div><div class="field-label">현재환율</div><div class="field-val">${rate?fmt(rate,2):'입력필요'}</div></div>
        <div><div class="field-label">평가금액</div><div class="field-val">${fmt(cur)}원</div></div>
      </div>
    </div>`;
  }
  const totalPnl = totalCur-totalBuy; const totalPct = totalBuy>0?(totalPnl/totalBuy)*100:0;
  const closedBuy = closed.reduce((a,t)=>a+t.buyKrw,0);
  const closedPnl = closed.reduce((a,t)=>a+(t.buyFx*krwRate(t.ccy,t.sellRate)-t.buyKrw),0);
  const closedPct = closedBuy>0 ? (closedPnl/closedBuy)*100 : 0;

  list.innerHTML = `
    <div class="card">
      <div class="card-label">진행 현황</div>
      ${open.length===0 ? '<p style="font-size:13px;color:#8e8e93">진행중인 투자 없음</p>' : openRows +
        (Object.keys(byCcy).length>1 ? `<hr class="divider"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:500">합계</span>${pnlBadge(totalPnl,totalPct)}</div><div class="sub-num">${fmt(totalBuy)}원 → ${fmt(totalCur)}원</div>` : '')}
    </div>
    <div class="card">
      <div class="card-label">완료 현황</div>
      <span class="big-num" style="color:${closedPnl>=0?'#0f6e56':'#993c1d'}">${closedPnl>=0?'+':''}${fmt(closedPnl)}원</span>
      ${closed.length>0?`<div class="sub-num">${closedPct>=0?'+':''}${closedPct.toFixed(2)}% · ${closed.length}건 완료</div>`:''}
    </div>`;
}

// ── Render Open ───────────────────────────────────────────────────────────────
function renderOpen() {
  const top = document.getElementById('open-top');
  const list = document.getElementById('open-list');
  const open = trades.filter(t => !t.sellRate);

  top.innerHTML = `
    <div id="trend-open"></div>
    <div class="sort-row">
      <select class="form-input sort-select" onchange="sortOpen=this.value;render()">${sortOptions(sortOpen)}</select>
      <button class="btn-add-inline" onclick="openAddModal()">+ 매수 추가</button>

  const sorted = sortTrades(open, sortOpen, 'buyDate');
  if (sorted.length===0) { list.innerHTML = '<p class="empty">진행중인 투자 없음<br><br>위 "+ 매수 추가" 버튼으로 추가하세요</p>'; return; }
  list.innerHTML = sorted.map(t => renderOpenCard(t)).join('');
}

function renderOpenCard(t) {
  const rate = effectiveRate(t.ccy) || t.buyRate;
  const cur = t.buyFx * krwRate(t.ccy, rate); const pnl = cur-t.buyKrw; const pct = t.buyKrw>0?(pnl/t.buyKrw)*100:0;
  return `<div class="card" style="margin-bottom:8px" onclick="openEditModal('${t.id}')">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="display:flex;gap:6px;align-items:center">${ccyTag(t.ccy)}<span style="font-size:12px;color:#8e8e93">${t.buyDate}</span></div>
      ${pnlBadge(pnl,pct)}
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div><div class="field-label">매수환율</div><div class="field-val">${fmt(t.buyRate,2)}</div></div>
      <div><div class="field-label">${t.ccy}</div><div class="field-val">${fmtFx(t.buyFx,t.ccy)}</div></div>
      <div><div class="field-label">매수금액</div><div class="field-val">${fmt(t.buyKrw)}원</div></div>
      <div><div class="field-label">현재평가</div><div class="field-val">${fmt(cur)}원</div></div>
    </div>
    ${t.note?`<p style="font-size:12px;color:#8e8e93;margin-bottom:8px">${escapeHtml(t.note)}</p>`:''}
    <div style="display:flex;gap:6px">
      <button class="btn-sell" onclick="event.stopPropagation();openSellModal('${t.id}')">매도</button>
    </div>
  </div>`;
}

// ── Render Closed ─────────────────────────────────────────────────────────────
function renderClosed() {
  const top = document.getElementById('closed-top');
  const list = document.getElementById('closed-list');
  let closed = trades.filter(t=>t.sellRate);

  if (closedRange.start) closed = closed.filter(t=>t.sellDate >= closedRange.start);
  if (closedRange.end)   closed = closed.filter(t=>t.sellDate <= closedRange.end);

  const totalBuy = closed.reduce((a,t)=>a+t.buyKrw,0);
  const totalSell = closed.reduce((a,t)=>a+t.buyFx*krwRate(t.ccy,t.sellRate),0);
  const totalPnl = totalSell-totalBuy; const totalPct = totalBuy>0?(totalPnl/totalBuy)*100:0;

  top.innerHTML = `
    <div id="trend-closed"></div>
    <div class="card" style="margin-bottom:10px">
      <div class="card-label">기간별 확정손익</div>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <input type="date" id="cr-start" class="form-input" style="font-size:13px;flex:1;min-width:120px" value="${closedRange.start}" onchange="closedRange.start=this.value;render()">
        <input type="date" id="cr-end" class="form-input" style="font-size:13px;flex:1;min-width:120px" value="${closedRange.end}" onchange="closedRange.end=this.value;render()">
        <button class="btn-ghost" onclick="closedRange={start:'',end:''};render()">초기화</button>
      </div>
      <span class="big-num" style="color:${totalPnl>=0?'#0f6e56':'#993c1d'}">${totalPnl>=0?'+':''}${fmt(totalPnl)}원</span>
      <div class="sub-num">${fmt(totalBuy)}원 → ${fmt(totalSell)}원 (${totalPct>=0?'+':''}${totalPct.toFixed(2)}%) · ${closed.length}건</div>
    </div>
    <div class="sort-row">
      <select class="form-input sort-select" onchange="sortClosed=this.value;render()">${sortOptions(sortClosed)}</select>
    </div>`;
  renderTrendSection('trend-closed', closed);

  const sorted = sortTrades(closed, sortClosed, 'sellDate');
  if (sorted.length===0) { list.innerHTML = '<p class="empty">완료된 투자 없음</p>'; return; }
  list.innerHTML = sorted.map(t => renderClosedCard(t)).join('');
}

function renderClosedCard(t) {
  const sellKrw = t.buyFx*krwRate(t.ccy,t.sellRate); const pnl = sellKrw-t.buyKrw; const pct = t.buyKrw>0?(pnl/t.buyKrw)*100:0;
  return `<div class="card" style="margin-bottom:8px" onclick="openEditModal('${t.id}')">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${ccyTag(t.ccy)}<span style="font-size:12px;color:#8e8e93">매수 ${t.buyDate} → 매도 ${t.sellDate}</span></div>
    </div>
    <div class="grid2" style="margin-bottom:8px">
      <div><div class="field-label">매수환율</div><div class="field-val">${fmt(t.buyRate,2)}</div></div>
      <div><div class="field-label">매도환율</div><div class="field-val">${fmt(t.sellRate,2)}</div></div>
      <div><div class="field-label">매수금</div><div class="field-val">${fmt(t.buyKrw)}원</div></div>
      <div><div class="field-label">매도금</div><div class="field-val">${fmt(sellKrw)}원</div></div>
    </div>
    ${t.note?`<p style="font-size:12px;color:#8e8e93;margin-bottom:8px">${escapeHtml(t.note)}</p>`:''}
    ${pnlBadge(pnl,pct)}
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  renderRateBar();
  if (currentTab==='overview') renderOverview();
  else if (currentTab==='open') renderOpen();
  else renderClosed();
}

// ── Add Trade ─────────────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('f-date').value = today();
  document.getElementById('f-ccy').value = 'USD';
  ['f-rate','f-fx','f-krw','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('add-error').style.display = 'none';
  document.getElementById('add-modal').style.display = 'flex';
  updateAddRateDefault();
}
function updateAddRateDefault() {
  const ccy = document.getElementById('f-ccy').value;
  const r = effectiveRate(ccy);
  document.getElementById('f-rate').value = r ? r : '';
}
function closeAddModal() { document.getElementById('add-modal').style.display='none'; }
function saveTrade() {
  const date=document.getElementById('f-date').value;
  const ccy=document.getElementById('f-ccy').value;
  const rate=parseFloat(document.getElementById('f-rate').value);
  const fx=parseFloat(document.getElementById('f-fx').value);
  const krwRaw=document.getElementById('f-krw').value;
  const krw=krwRaw?parseFloat(krwRaw):(rate&&fx?Math.round(krwRate(ccy,rate)*fx):0);
  const note=document.getElementById('f-note').value.trim();
  const errEl=document.getElementById('add-error');
  if (!date||!rate||!fx||!krw){errEl.textContent='매수일, 환율, 외화금액은 필수입니다';errEl.style.display='block';return;}
  trades.unshift({id:Date.now().toString(),ccy,buyDate:date,buyRate:rate,buyFx:fx,buyKrw:krw,note});
  save(); closeAddModal(); render(); checkAutoBackup();
}

// ── Sell ──────────────────────────────────────────────────────────────────────
function openSellModal(id) {
  sellTargetId=id;
  const t=trades.find(x=>x.id===id);
  document.getElementById('sell-title').textContent=`매도 — ${t.ccy} ${fmtFx(t.buyFx,t.ccy)}`;
  document.getElementById('s-date').value=today();
  document.getElementById('s-rate').value='';
  document.getElementById('sell-preview').style.display='none';
  document.getElementById('sell-error').style.display='none';
  document.getElementById('sell-modal').style.display='flex';
}
function closeSellModal() { document.getElementById('sell-modal').style.display='none'; sellTargetId=null; }
function updateSellPreview() {
  const t=trades.find(x=>x.id===sellTargetId); if(!t)return;
  const rate=parseFloat(document.getElementById('s-rate').value);
  const prev=document.getElementById('sell-preview');
  if(!rate){prev.style.display='none';return;}
  const sellKrw=Math.round(t.buyFx*krwRate(t.ccy,rate)); const pnl=sellKrw-t.buyKrw;
  const col=pnl>=0?'#0f6e56':'#e0412b';
  prev.innerHTML=`예상 매도금액 ${fmt(sellKrw)}원 <span style="color:${col}">(${pnl>=0?'+':''}${fmt(pnl)}원)</span>`;
  prev.style.display='block';
}
function confirmSell() {
  const date=document.getElementById('s-date').value;
  const rate=parseFloat(document.getElementById('s-rate').value);
  const errEl=document.getElementById('sell-error');
  if(!date||!rate){errEl.textContent='매도일과 환율을 입력해주세요';errEl.style.display='block';return;}
  trades=trades.map(t=>t.id===sellTargetId?{...t,sellDate:date,sellRate:rate}:t);
  save(); closeSellModal(); render(); checkAutoBackup();
}

// ── Edit / Delete / Restore ──────────────────────────────────────────────────
function openEditModal(id) {
  editTargetId = id;
  const t = trades.find(x=>x.id===id); if (!t) return;
  const isClosed = !!t.sellRate;
  document.getElementById('edit-title').textContent = isClosed ? '투자완료 수정' : '매수 수정';
  document.getElementById('e-date').value = t.buyDate;
  document.getElementById('e-ccy').value = t.ccy;
  document.getElementById('e-rate').value = t.buyRate;
  document.getElementById('e-fx').value = t.buyFx;
  document.getElementById('e-krw').value = t.buyKrw;
  document.getElementById('e-note').value = t.note || '';
  document.getElementById('edit-sell-fields').style.display = isClosed ? 'block' : 'none';
  document.getElementById('e-sdate').value = t.sellDate || '';
  document.getElementById('e-srate').value = t.sellRate || '';
  document.getElementById('edit-error').style.display = 'none';
  document.getElementById('edit-menu').style.display = 'none';
  document.getElementById('edit-menu-action').textContent = isClosed ? '삭제 (투자진행으로 복원)' : '삭제';
  document.getElementById('edit-modal').style.display = 'flex';
}
function closeEditModal() {
  document.getElementById('edit-modal').style.display = 'none';
  document.getElementById('edit-menu').style.display = 'none';
  editTargetId = null;
}
function toggleEditMenu() {
  const m = document.getElementById('edit-menu');
  m.style.display = m.style.display==='none' ? 'block' : 'none';
}
function editMenuAction() {
  const t = trades.find(x=>x.id===editTargetId); if (!t) return;
  if (t.sellRate) {
    if (!confirm('이 항목을 삭제하면 "투자진행중" 상태로 복원됩니다. 계속할까요?')) return;
    trades = trades.map(x => {
      if (x.id !== editTargetId) return x;
      const { sellDate, sellRate, ...rest } = x;
      return rest;
    });
  } else {
    if (!confirm('이 항목을 삭제할까요?')) return;
    trades = trades.filter(x=>x.id!==editTargetId);
  }
  save(); closeEditModal(); render(); checkAutoBackup();
}
function saveEditTrade() {
  const t = trades.find(x=>x.id===editTargetId); if (!t) return;
  const date = document.getElementById('e-date').value;
  const ccy = document.getElementById('e-ccy').value;
  const rate = parseFloat(document.getElementById('e-rate').value);
  const fx = parseFloat(document.getElementById('e-fx').value);
  const krwRaw = document.getElementById('e-krw').value;
  const krw = krwRaw ? parseFloat(krwRaw) : (rate&&fx ? Math.round(krwRate(ccy,rate)*fx) : 0);
  const note = document.getElementById('e-note').value.trim();
  const errEl = document.getElementById('edit-error');
  if (!date||!rate||!fx||!krw) { errEl.textContent='매수일, 환율, 외화금액은 필수입니다'; errEl.style.display='block'; return; }

  const updated = { ...t, buyDate:date, ccy, buyRate:rate, buyFx:fx, buyKrw:krw, note };
  if (t.sellRate) {
    const sdate = document.getElementById('e-sdate').value;
    const srate = parseFloat(document.getElementById('e-srate').value);
    if (!sdate||!srate) { errEl.textContent='매도일과 매도환율을 입력해주세요'; errEl.style.display='block'; return; }
    updated.sellDate = sdate; updated.sellRate = srate;
  }
  trades = trades.map(x=>x.id===editTargetId?updated:x);
  save(); closeEditModal(); render(); checkAutoBackup();
}

// ── Export ───────────────────────────────────────────────────────────────────
const exportHeaders = ['ID','통화','매수일','매수환율','외화금액','매수금액KRW','메모','매도일','매도환율','매도금액KRW','손익KRW'];
function getExportRows() {
  return trades.filter(t => {
    if (!exportFilters[t.ccy]) return false;
    const isClosed = !!t.sellRate;
    if (isClosed && !exportFilters.sell) return false;
    if (!isClosed && !exportFilters.buy) return false;
    const dateForFilter = isClosed ? t.sellDate : t.buyDate;
    if (exportFilters.start && dateForFilter < exportFilters.start) return false;
    if (exportFilters.end && dateForFilter > exportFilters.end) return false;
    return true;
  }).map(t => {
    const sellKrw = t.sellRate ? Math.round(t.buyFx*krwRate(t.ccy,t.sellRate)) : '';
    const pnl = t.sellRate ? Math.round(t.buyFx*krwRate(t.ccy,t.sellRate) - t.buyKrw) : '';
    return [t.id, t.ccy, t.buyDate, t.buyRate, t.buyFx, t.buyKrw, t.note||'', t.sellDate||'', t.sellRate||'', sellKrw, pnl];
  });
}
function openExportModal() {
  exportStage = 'select';
  renderExportModal();
  document.getElementById('export-modal').style.display = 'flex';
}
function closeExportModal() { document.getElementById('export-modal').style.display='none'; }
function renderExportModal() {
  document.getElementById('export-title').textContent = exportStage==='select' ? '내보내기 - 항목 선택' : '내보내기 - 미리보기';
  const body = document.getElementById('export-body');
  if (exportStage==='select') {
    body.innerHTML = `
      <div class="form-row"><label class="form-label">시작일 (매수일/매도일 기준, 비우면 전체)</label><input type="date" id="ex-start" class="form-input" value="${exportFilters.start}"></div>
      <div class="form-row"><label class="form-label">종료일</label><input type="date" id="ex-end" class="form-input" value="${exportFilters.end}"></div>
      <div class="form-row">
        <label class="form-label">유형</label>
        <div class="checkbox-row"><input type="checkbox" id="ex-buy" ${exportFilters.buy?'checked':''}><label for="ex-buy">매수 (진행중 포함)</label></div>
        <div class="checkbox-row"><input type="checkbox" id="ex-sell" ${exportFilters.sell?'checked':''}><label for="ex-sell">매도 (완료)</label></div>
      </div>
      <div class="form-row">
        <label class="form-label">통화</label>
        <div class="checkbox-row"><input type="checkbox" id="ex-USD" ${exportFilters.USD?'checked':''}><label for="ex-USD">USD</label></div>
        <div class="checkbox-row"><input type="checkbox" id="ex-JPY" ${exportFilters.JPY?'checked':''}><label for="ex-JPY">JPY</label></div>
        <div class="checkbox-row"><input type="checkbox" id="ex-EUR" ${exportFilters.EUR?'checked':''}><label for="ex-EUR">EUR</label></div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="goExportPreview()">미리보기</button>
        <button class="btn-cancel" onclick="closeExportModal()">취소</button>
      </div>`;
  } else {
    const rows = getExportRows();
    let table = `<div class="export-table-wrap"><table class="export-table"><tr>${exportHeaders.map(h=>`<th>${h}</th>`).join('')}</tr>`;
    for (const r of rows) table += `<tr>${r.map(v=>`<td>${escapeHtml(String(v))}</td>`).join('')}</tr>`;
    table += `</table></div>`;
    body.innerHTML = `
      <p style="font-size:13px;margin-bottom:10px">총 <b>${rows.length}건</b>이 내보내질 예정입니다. 아래 표는 실제 내보낼 자료와 동일합니다.</p>
      ${rows.length ? table : '<p class="empty" style="margin-top:10px">선택한 조건에 해당하는 데이터가 없습니다</p>'}
      <div class="btn-row">
        <button class="btn-primary" onclick="finalExport()" ${rows.length?'':'disabled'}>CSV 다운로드</button>
        <button class="btn-cancel" onclick="exportStage='select';renderExportModal()">다시 선택</button>
      </div>`;
  }
}
function goExportPreview() {
  exportFilters.start = document.getElementById('ex-start').value;
  exportFilters.end = document.getElementById('ex-end').value;
  exportFilters.buy = document.getElementById('ex-buy').checked;
  exportFilters.sell = document.getElementById('ex-sell').checked;
  exportFilters.USD = document.getElementById('ex-USD').checked;
  exportFilters.JPY = document.getElementById('ex-JPY').checked;
  exportFilters.EUR = document.getElementById('ex-EUR').checked;
  exportStage = 'preview';
  renderExportModal();
}
function finalExport() {
  const rows = getExportRows();
  if (!rows.length) return;
  const csv = [exportHeaders, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `도시락통FX_${today()}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  closeExportModal();
}

// ── GitHub Backup (Settings) ─────────────────────────────────────────────────
function openSettingsModal() {
  document.getElementById('gh-token').value = ghSettings.token || '';
  document.getElementById('gh-owner').value = ghSettings.owner || '';
  document.getElementById('gh-repo').value = ghSettings.repo || '';
  document.getElementById('gh-path').value = ghSettings.path || 'fx_trades_backup.json';
  const last = localStorage.getItem(LAST_BACKUP_KEY);
  document.getElementById('gh-last').textContent = last ? `마지막 백업: ${new Date(last).toLocaleString('ko-KR')}` : '백업 기록 없음';
  document.getElementById('settings-error').style.display = 'none';
  document.getElementById('settings-info').style.display = 'none';
  document.getElementById('settings-modal').style.display = 'flex';
}
function closeSettingsModal() { document.getElementById('settings-modal').style.display='none'; }
async function saveAndBackup() {
  saveSettings();
  const errEl = document.getElementById('settings-error');
  const infoEl = document.getElementById('settings-info');
  errEl.style.display='none'; infoEl.style.display='none';
  try {
    await doBackup();
    infoEl.textContent = '백업 완료!';
    infoEl.style.display='block';
    document.getElementById('gh-last').textContent = `마지막 백업: ${new Date().toLocaleString('ko-KR')}`;
  } catch(e) {
    errEl.textContent = '백업 실패: ' + e.message;
    errEl.style.display='block';
  }
}
async function doBackup() {
  if (!ghSettings.token || !ghSettings.owner || !ghSettings.repo) throw new Error('GitHub 설정을 모두 입력해주세요');
  const apiUrl = `https://api.github.com/repos/${ghSettings.owner}/${ghSettings.repo}/contents/${ghSettings.path}`;
  let sha = null;
  try {
    const getRes = await fetch(apiUrl, { headers: { Authorization: `Bearer ${ghSettings.token}`, Accept:'application/vnd.github+json' } });
    if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }
  } catch {}
  const payload = JSON.stringify({ trades, autoRates, manualRates, exportedAt: new Date().toISOString() }, null, 2);
  const content = btoa(unescape(encodeURIComponent(payload)));
  const body = { message: `도시락통FX 자동 백업 ${today()}`, content };
  if (sha) body.sha = sha;
  const putRes = await fetch(apiUrl, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${ghSettings.token}`, Accept:'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if (!putRes.ok) {
    const j = await putRes.json().catch(()=>({}));
    throw new Error(j.message || `HTTP ${putRes.status}`);
  }
  localStorage.setItem(LAST_BACKUP_KEY, new Date().toISOString());
}
function checkAutoBackup() {
  if (!ghSettings.token || !ghSettings.owner || !ghSettings.repo) return;
  const last = localStorage.getItem(LAST_BACKUP_KEY);
  const now = Date.now();
  if (!last || (now - new Date(last).getTime()) > 24*60*60*1000) {
    doBackup().catch(()=>{ /* silent — user can retry from settings */ });
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
load();
switchTab('overview');
fetchRates();
checkAutoBackup();
</script>
